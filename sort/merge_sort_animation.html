<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>归并排序 - 排序动画</title>
<style>
/* ==================== 全局基础样式 【不要修改】 ==================== */
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    background: #05070f;
    color: #fff;
    font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
    overflow: hidden;
}

.container {
    display: flex;
    width: 100%;
    height: 100vh;
    gap: 12px;
    padding: 16px;
}

.left-panel, .right-panel {
    flex: 1;
    background: rgba(12, 15, 25, 0.85);
    border: 1px solid rgba(100, 150, 255, 0.2);
    border-radius: 16px;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
}

.left-panel::before, .right-panel::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 50% 50%, rgba(60, 100, 255, 0.03) 0%, transparent 50%);
    pointer-events: none;
}

.title {
    font-size: 42px;
    font-weight: bold;
    margin-bottom: 16px;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
    letter-spacing: 4px;
}

.desc {
    font-size: 20px;
    color: #7a8ba8;
    margin-bottom: 50px;
    letter-spacing: 1px;
}

/* ==================== 数组容器 ==================== */
.arr-container {
    position: relative;
    width: 80%;
    height: 130px;
}

/* 临时数组容器 */
.temp-container {
    position: relative;
    width: 80%;
    height: 110px;
    margin-top: 24px;
}
.temp-label {
    position: absolute;
    top: -18px;
    left: 0;
    font-size: 11px;
    color: rgba(255, 200, 50, 0.5);
    letter-spacing: 1px;
}

/* ==================== 主数组小球 ==================== */
.circle {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: bold;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    transition: left 0.4s ease-in-out, background 0.25s ease,
                box-shadow 0.25s ease, border 0.25s ease, filter 0.25s ease;
    cursor: default;
    user-select: none;
}

.circle.normal {
    border: 2px solid rgba(100, 160, 255, 0.6);
    background: rgba(20, 30, 60, 0.7);
    color: #e0e8ff;
    box-shadow: 0 0 12px rgba(80, 140, 255, 0.2),
                inset 0 0 8px rgba(80, 140, 255, 0.05);
    z-index: 1;
}

.circle.left-part {
    background: linear-gradient(135deg, #a855f7, #c084fc);
    color: #fff;
    box-shadow: 0 0 24px rgba(168, 85, 247, 0.6),
                0 0 48px rgba(168, 85, 247, 0.2);
    border: none;
    z-index: 10;
    filter: brightness(1.15);
}

.circle.right-part {
    background: linear-gradient(135deg, #06b6d4, #22d3ee);
    color: #fff;
    box-shadow: 0 0 24px rgba(6, 182, 212, 0.6),
                0 0 48px rgba(6, 182, 212, 0.2);
    border: none;
    z-index: 10;
    filter: brightness(1.15);
}

.circle.active {
    background: linear-gradient(135deg, #ff7823, #ff9a44);
    color: #fff;
    box-shadow: 0 0 24px rgba(255, 120, 35, 0.6),
                0 0 48px rgba(255, 120, 35, 0.2);
    border: none;
    z-index: 100;
    filter: brightness(1.15);
}

.circle.sorted {
    background: rgba(30, 180, 80, 0.7);
    border: 2px solid rgba(60, 220, 100, 0.6);
    color: #fff;
    box-shadow: 0 0 12px rgba(60, 220, 100, 0.2);
    z-index: 2;
}

/* 空占位（主数组中元素移走后） */
.circle.placeholder {
    border: 2px dashed rgba(100, 160, 255, 0.2);
    background: rgba(10, 15, 30, 0.3);
    color: transparent;
    box-shadow: none;
    z-index: 0;
}

/* ==================== 临时数组框 ==================== */
.tmp-box {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: bold;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    transition: background 0.3s ease, box-shadow 0.3s ease, border 0.3s ease, color 0.3s ease;
    cursor: default;
    user-select: none;
}

/* 空框 */
.tmp-box.empty {
    border: 2px dashed rgba(234, 179, 8, 0.25);
    background: rgba(30, 25, 10, 0.3);
    color: transparent;
    box-shadow: none;
}

/* 已填充 */
.tmp-box.filled {
    background: linear-gradient(135deg, #eab308, #facc15);
    color: #1a1a2e;
    box-shadow: 0 0 20px rgba(234, 179, 8, 0.5),
                0 0 40px rgba(234, 179, 8, 0.15);
    border: none;
    font-weight: 800;
}

/* ==================== 移动中的小球（脱离定位，用 fixed/absolute 动画） ==================== */
.move-ball {
    position: absolute;
    width: 90px;
    height: 90px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    font-weight: 800;
    z-index: 300;
    pointer-events: none;
    transition: top 0.5s ease-in-out, left 0.5s ease-in-out, transform 0.5s ease-in-out;
}

.move-ball.to-tmp {
    background: linear-gradient(135deg, #eab308, #facc15);
    color: #1a1a2e;
    box-shadow: 0 0 28px rgba(234, 179, 8, 0.7),
                0 0 56px rgba(234, 179, 8, 0.25);
}

.move-ball.to-main {
    background: rgba(30, 180, 80, 0.7);
    border: 2px solid rgba(60, 220, 100, 0.6);
    color: #fff;
    box-shadow: 0 0 28px rgba(60, 220, 100, 0.6),
                0 0 56px rgba(60, 220, 100, 0.2);
}

/* ==================== 拆分外框 ==================== */
.split-frame {
    position: absolute;
    top: -8px;
    height: calc(100% + 16px);
    border: 2px dashed rgba(100, 160, 255, 0.35);
    border-radius: 12px;
    pointer-events: none;
    z-index: 50;
    transition: left 0.4s ease-in-out, width 0.4s ease-in-out, opacity 0.3s ease;
}

/* ==================== 分隔线 ==================== */
.divider {
    position: absolute;
    top: 0;
    height: 100%;
    width: 0;
    border-left: 2px dashed rgba(100, 160, 255, 0.35);
    display: none;
    z-index: 50;
    pointer-events: none;
}
.divider.show { display: block; }
.divider-label {
    position: absolute;
    top: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(100, 160, 255, 0.5);
    white-space: nowrap;
    letter-spacing: 1px;
}

.comment-box {
    margin-top: 40px;
    padding: 12px 24px;
    background: rgba(100, 140, 255, 0.08);
    border: 1px solid rgba(100, 140, 255, 0.12);
    border-radius: 10px;
    color: #8aa0c0;
    font-size: 15px;
    text-align: center;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
}

.stats-row {
    display: flex;
    justify-content: center;
    gap: 3rem;
    margin-top: 20px;
}

.stat-item { text-align: center; }

.stat-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: #ff9040;
    text-shadow: 0 0 10px rgba(255, 144, 64, 0.3);
}

.stat-label {
    font-size: 0.8rem;
    color: #5a6a80;
    margin-top: 4px;
    letter-spacing: 1px;
}

.controls-row {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 24px;
}

.ctrl-btn {
    background: rgba(100, 140, 255, 0.1);
    border: 1px solid rgba(100, 140, 255, 0.25);
    color: #c0d0f0;
    padding: 10px 28px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-family: inherit;
    letter-spacing: 1px;
}

.ctrl-btn:hover {
    background: rgba(100, 140, 255, 0.25);
    border-color: rgba(100, 140, 255, 0.5);
    box-shadow: 0 0 12px rgba(100, 140, 255, 0.15);
}

.ctrl-btn:active { transform: scale(0.97); }

.ctrl-btn.primary {
    background: rgba(100, 180, 255, 0.2);
    border-color: rgba(100, 180, 255, 0.4);
}

.right-panel {
    justify-content: flex-start;
    padding-top: 30px;
}

.code-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(100, 140, 255, 0.1);
    width: 100%;
}

.code-dot { width: 12px; height: 12px; border-radius: 50%; }
.code-dot-red { background: #ff5f57; }
.code-dot-yellow { background: #ffbd2e; }
.code-dot-green { background: #28c840; }

.code-filename {
    color: #5a6a80;
    font-size: 13px;
    margin-left: 12px;
    font-family: Consolas, monospace;
}

.info-bar {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 20px;
    padding: 8px 16px;
    background: rgba(100, 140, 255, 0.05);
    border-radius: 8px;
    border: 1px solid rgba(100, 140, 255, 0.08);
    width: 100%;
}

.info-item { color: #5a6a80; font-size: 13px; }
.info-value { color: #a0b8e0; font-weight: 600; }

.code-block {
    width: 100%;
    padding: 16px 0;
    font-family: 'Consolas', 'Fira Code', 'Courier New', monospace;
    font-size: 15px;
    line-height: 2;
    color: #abb2bf;
    overflow-x: auto;
}

.code-line {
    display: block;
    padding: 1px 12px;
    border-radius: 4px;
    border-left: 3px solid transparent;
    white-space: pre;
    transition: background 0.3s ease, border-color 0.3s ease;
}

.code-line.highlight {
    background: rgba(180, 160, 50, 0.2);
    border-left: 3px solid #c8a832;
}

.line-num {
    color: #3a4050;
    display: inline-block;
    width: 28px;
    text-align: right;
    margin-right: 16px;
    user-select: none;
}

.syn-keyword  { color: #c678dd; }
.syn-type     { color: #e5c07b; }
.syn-func     { color: #61afef; }
.syn-number   { color: #56b6c2; }
.syn-string   { color: #98c379; }
.syn-comment  { color: #5c6370; font-style: italic; }
.syn-op       { color: #abb2bf; }
.syn-var      { color: #e0e0e0; }

.speed-control {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 16px;
}

.speed-label { color: #5a6a80; font-size: 13px; }

.speed-slider {
    -webkit-appearance: none;
    width: 120px;
    height: 4px;
    background: rgba(100, 140, 255, 0.2);
    border-radius: 2px;
    outline: none;
}

.speed-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px;
    height: 14px;
    background: #6496ff;
    border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 8px rgba(100, 150, 255, 0.4);
}

.speed-value { color: #a0b8e0; font-size: 13px; min-width: 40px; }

.done-badge {
    display: none;
    margin-top: 12px;
    padding: 8px 24px;
    background: rgba(30, 180, 80, 0.15);
    border: 1px solid rgba(60, 220, 100, 0.3);
    border-radius: 8px;
    color: #4ade80;
    font-size: 14px;
    letter-spacing: 2px;
}
.done-badge.show { display: block; }
</style>
</head>
<body>

<div class="container">
    <div class="left-panel">
        <h1 class="title">归并排序</h1>
        <p class="desc">递归拆分再合并，每次合并两个有序子数组</p>

        <div class="arr-container" id="arrBox">
            <div class="divider" id="divider"><span class="divider-label">已排序 ↑</span></div>
        </div>

        <div class="temp-container" id="tempBox">
            <span class="temp-label">临时数组 tmp[]</span>
        </div>

        <div class="comment-box" id="commentBox">🎮 点击「开始」按钮启动排序动画</div>

        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-value" id="loopCount">0</div>
                <div class="stat-label">归并次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="compCount">0</div>
                <div class="stat-label">比较次数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="swapCount">0</div>
                <div class="stat-label">移动次数</div>
            </div>
        </div>

        <div class="controls-row">
            <button class="ctrl-btn primary" id="btnStart" onclick="startSort()">▶ 开始</button>
            <button class="ctrl-btn" id="btnPause" onclick="togglePause()">⏸ 暂停</button>
            <button class="ctrl-btn" id="btnReset" onclick="resetAll()">🔄 重置</button>
        </div>

        <div class="speed-control">
            <span class="speed-label">动画速度</span>
            <input type="range" class="speed-slider" id="speedSlider" min="1" max="10" value="5" oninput="updateSpeed()">
            <span class="speed-value" id="speedValue">5</span>
        </div>

        <div class="done-badge" id="doneBadge">🎉 排序完成！</div>
    </div>

    <div class="right-panel">
        <div class="code-header">
            <div class="code-dot code-dot-red"></div>
            <div class="code-dot code-dot-yellow"></div>
            <div class="code-dot code-dot-green"></div>
            <span class="code-filename">MergeSort.java</span>
        </div>
        <div class="info-bar">
            <div class="info-item">⏱ 时间: <span class="info-value">O(n log n)</span></div>
            <div class="info-item">💾 空间: <span class="info-value">O(n)</span></div>
            <div class="info-item">📊 稳定性: <span class="info-value">稳定</span></div>
        </div>
        <div class="code-block" id="codeBlock"></div>
    </div>
</div>

<script>
// ==================== 归并排序 Java 代码 ====================

const JAVA_CODE = [
    'public static void mergeSort(int[] a, int l, int r) {',   // 1
    '    if (l < r) {',                                         // 2
    '        int m = (l + r) / 2;',                             // 3
    '        mergeSort(a, l, m);',                              // 4
    '        mergeSort(a, m + 1, r);',                          // 5
    '        merge(a, l, m, r);',                               // 6
    '    }',                                                     // 7
    '}',                                                         // 8
    'public static void merge(int[] a, int l, int m, int r) {', // 9
    '    int[] tmp = new int[r - l + 1];',                      // 10
    '    int i = l, j = m + 1, k = 0;',                        // 11
    '    while (i <= m && j <= r) {',                           // 12
    '        if (a[i] <= a[j]) tmp[k++] = a[i++];',            // 13
    '        else              tmp[k++] = a[j++];',            // 14
    '    }',                                                     // 15
    '    while (i <= m) tmp[k++] = a[i++];',                   // 16
    '    while (j <= r) tmp[k++] = a[j++];',                   // 17
    '    for (k = 0; k < tmp.length; k++)',                    // 18
    '        a[l + k] = tmp[k];',                               // 19
    '}',                                                         // 20
];

const LINE_SPLIT     = 3;
const LINE_RECURSE_L = 4;
const LINE_RECURSE_R = 5;
const LINE_MERGE     = 6;
const LINE_TMP       = 10;
const LINE_COMPARE   = 13;
const LINE_COPYBACK  = 19;
const INIT_ARR = [5, 3, 8, 4, 2];

// ==================== 状态变量 ====================
let arr = [];
let circleOrder = [];
let comparisons = 0;
let swaps = 0;
let loops = 0;
let isRunning = false;
let isPaused = false;
let generatorRef = null;

// ==================== 工具函数 ====================

function getDelay() {
    return 1350 - parseInt(document.getElementById('speedSlider').value) * 120;
}

function sleep(ms) {
    return new Promise(r => { const t = setTimeout(r, ms); sleep._t = t; });
}
function abortSleep() { if (sleep._t) { clearTimeout(sleep._t); sleep._t = null; } }

function getPos() {
    const box = document.getElementById('arrBox');
    const w = box.clientWidth, cw = 90, n = arr.length;
    const gap = n > 1 ? (w - cw * n) / (n - 1) : 0;
    return { w, cw, gap };
}
function posLeft(pos) {
    const { cw, gap } = getPos();
    return pos * (cw + gap);
}

function getCircleAt(pos) {
    return document.getElementById('circle-' + circleOrder[pos]);
}
function setCircleState(pos, state) {
    const el = getCircleAt(pos);
    if (el) el.className = 'circle ' + state;
}
function getEl(id) {
    return document.getElementById('circle-' + id);
}

function updateStats() {
    document.getElementById('loopCount').textContent = loops;
    document.getElementById('compCount').textContent = comparisons;
    document.getElementById('swapCount').textContent = swaps;
}
function setComment(text) {
    document.getElementById('commentBox').textContent = text;
}

function updateDivider(sortedCount) {
    const div = document.getElementById('divider');
    if (sortedCount <= 0) { div.classList.remove('show'); return; }
    if (sortedCount >= arr.length) { div.classList.remove('show'); return; }
    const { cw, gap } = getPos();
    div.style.left = (sortedCount * (cw + gap) - gap / 2) + 'px';
    div.classList.add('show');
}

// ==================== 临时数组工具 ====================

// 初始化 5 个空框
function renderTempBoxes() {
    const box = document.getElementById('tempBox');
    // 保留 label
    const label = box.querySelector('.temp-label');
    box.innerHTML = '';
    if (label) box.appendChild(label);

    const { cw, gap } = getPos();
    for (let i = 0; i < arr.length; i++) {
        const div = document.createElement('div');
        div.className = 'tmp-box empty';
        div.id = 'tmp-' + i;
        div.style.left = (i * (cw + gap)) + 'px';
        box.appendChild(div);
    }
}

function getTmpBox(idx) {
    return document.getElementById('tmp-' + idx);
}

function fillTmpBox(idx, value) {
    const box = getTmpBox(idx);
    if (!box) return;
    box.className = 'tmp-box filled';
    box.textContent = value;
}

function emptyTmpBox(idx) {
    const box = getTmpBox(idx);
    if (!box) return;
    box.className = 'tmp-box empty';
    box.textContent = '';
}

function resetAllTmpBoxes() {
    for (let i = 0; i < arr.length; i++) emptyTmpBox(i);
}

// ==================== 拆分外框 ====================

function showSplitFrame(l, r) {
    removeSplitFrame();
    const box = document.getElementById('arrBox');
    const frame = document.createElement('div');
    frame.className = 'split-frame';
    frame.id = 'splitFrame';
    const left = posLeft(l) - 6;
    const right = posLeft(r) + 90 + 6;
    frame.style.left = left + 'px';
    frame.style.width = (right - left) + 'px';
    box.appendChild(frame);
}

function removeSplitFrame() {
    const old = document.getElementById('splitFrame');
    if (old) old.remove();
}

// ==================== 移动小球动画 ====================

function getMainElCenter(pos) {
    const box = document.getElementById('arrBox');
    const rect = box.getBoundingClientRect();
    const panelRect = box.closest('.left-panel').getBoundingClientRect();
    const left = posLeft(pos);
    return {
        x: rect.left - panelRect.left + left + 45,
        y: rect.top - panelRect.top + 65
    };
}

function getTmpBoxCenter(idx) {
    const tmpBox = getTmpBox(idx);
    if (!tmpBox) return { x: 0, y: 0 };
    const rect = tmpBox.getBoundingClientRect();
    const panelRect = tmpBox.closest('.left-panel').getBoundingClientRect();
    return {
        x: rect.left - panelRect.left + 45,
        y: rect.top - panelRect.top + 45
    };
}

// 主数组 → 临时数组
function animToTmp(fromPos, tmpIdx, value) {
    return new Promise(resolve => {
        const panel = document.querySelector('.left-panel');
        const from = getMainElCenter(fromPos);
        const to = getTmpBoxCenter(tmpIdx);

        const ball = document.createElement('div');
        ball.className = 'move-ball to-tmp';
        ball.textContent = value;
        ball.style.left = (from.x - 45) + 'px';
        ball.style.top = (from.y - 45) + 'px';
        panel.appendChild(ball);

        // 原位变空占位
        const mainEl = getCircleAt(fromPos);
        if (mainEl) {
            mainEl.className = 'circle placeholder';
            mainEl.textContent = '';
        }

        requestAnimationFrame(() => {
            ball.style.left = (to.x - 45) + 'px';
            ball.style.top = (to.y - 45) + 'px';
            ball.style.transform = 'scale(1.12)';
        });

        setTimeout(() => {
            ball.remove();
            fillTmpBox(tmpIdx, value);
            resolve();
        }, 520);
    });
}

// 临时数组 → 主数组
function animToMain(tmpIdx, toPos, value) {
    return new Promise(resolve => {
        const panel = document.querySelector('.left-panel');
        const from = getTmpBoxCenter(tmpIdx);
        const to = getMainElCenter(toPos);

        const ball = document.createElement('div');
        ball.className = 'move-ball to-main';
        ball.textContent = value;
        ball.style.left = (from.x - 45) + 'px';
        ball.style.top = (from.y - 45) + 'px';
        panel.appendChild(ball);

        emptyTmpBox(tmpIdx);

        requestAnimationFrame(() => {
            ball.style.left = (to.x - 45) + 'px';
            ball.style.top = (to.y - 45) + 'px';
            ball.style.transform = 'scale(1.12)';
        });

        setTimeout(() => {
            ball.remove();
            const mainEl = getCircleAt(toPos);
            if (mainEl) {
                mainEl.textContent = value;
                mainEl.className = 'circle sorted';
            }
            circleOrder[toPos] = toPos;
            resolve();
        }, 520);
    });
}

// ==================== 渲染函数 ====================

function initRender() {
    arr = [...INIT_ARR];
    renderCircles();
    renderTempBoxes();
    renderCode(0);
    updateStats();
}

function renderCircles() {
    const box = document.getElementById('arrBox');
    const divider = document.getElementById('divider');
    box.innerHTML = '';
    box.appendChild(divider);

    const { cw, gap } = getPos();
    circleOrder = [];
    arr.forEach((val, idx) => {
        const div = document.createElement('div');
        div.className = 'circle normal';
        div.id = 'circle-' + idx;
        div.textContent = val;
        div.style.left = (idx * (cw + gap)) + 'px';
        box.appendChild(div);
        circleOrder.push(idx);
    });
}

function renderCode(highlightLine) {
    const block = document.getElementById('codeBlock');
    let html = '';
    JAVA_CODE.forEach((line, i) => {
        const lineNum = i + 1;
        const cls = highlightLine === lineNum ? 'code-line highlight' : 'code-line';
        let s = escapeHtml(line);
        const ci = s.indexOf('//');
        if (ci !== -1) {
            s = highlightTokens(s.substring(0, ci)) + `<span class="syn-comment">${s.substring(ci)}</span>`;
        } else {
            s = highlightTokens(s);
        }
        html += `<span class="${cls}"><span class="line-num">${lineNum}</span>${s}</span>`;
    });
    block.innerHTML = html;
}

function highlightTokens(s) {
    s = s.replace(/\b(void|int|for|if|while|return|class|public|private|static|new|true|false|null|else)\b/g, '<span class="syn-keyword">$1</span>');
    s = s.replace(/\b(\d+)\b/g, '<span class="syn-number">$1</span>');
    s = s.replace(/\b([a-zA-Z_]\w*)\s*(?=\()/g, '<span class="syn-func">$1</span>');
    return s;
}
function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==================== 归并排序生成器 ====================

async function* mergeGen(l, m, r) {
    loops++;
    updateStats();

    // 高亮左右两部分
    for (let k = l; k <= m; k++) setCircleState(k, 'left-part');
    for (let k = m + 1; k <= r; k++) setCircleState(k, 'right-part');

    renderCode(LINE_MERGE);
    setComment(`合并 [${l}..${m}] 和 [${m+1}..${r}]`);
    await sleep(getDelay());
    if (isPaused) yield;

    renderCode(LINE_TMP);
    setComment(`使用 tmp[] 临时数组`);
    await sleep(getDelay() * 0.5);
    if (isPaused) yield;

    const tmp = [];
    let i = l, j = m + 1, k = 0;

    // 双指针比较
    while (i <= m && j <= r) {
        comparisons++;
        setCircleState(i, 'active');
        setCircleState(j, 'active');
        renderCode(LINE_COMPARE);
        setComment(`比较 a[${i}]=${arr[i]} 和 a[${j}]=${arr[j]}`);
        updateStats();
        await sleep(getDelay() * 0.7);
        if (isPaused) yield;

        if (arr[i] <= arr[j]) {
            const chosenPos = i;
            const val = arr[chosenPos];
            tmp.push(val);
            swaps++;
            updateStats();

            setComment(`${val} 较小 → tmp[${k}]`);
            await animToTmp(chosenPos, k, val);
            if (isPaused) yield;

            setCircleState(chosenPos, 'left-part');
            i++;
        } else {
            const chosenPos = j;
            const val = arr[chosenPos];
            tmp.push(val);
            swaps++;
            updateStats();

            setComment(`${val} 较小 → tmp[${k}]`);
            await animToTmp(chosenPos, k, val);
            if (isPaused) yield;

            setCircleState(chosenPos, 'right-part');
            j++;
        }
        k++;
    }

    // 左半剩余
    while (i <= m) {
        const val = arr[i];
        tmp.push(val);
        swaps++;
        updateStats();
        setComment(`剩余 ${val} → tmp[${k}]`);
        await animToTmp(i, k, val);
        if (isPaused) yield;
        setCircleState(i, 'left-part');
        i++; k++;
    }

    // 右半剩余
    while (j <= r) {
        const val = arr[j];
        tmp.push(val);
        swaps++;
        updateStats();
        setComment(`剩余 ${val} → tmp[${k}]`);
        await animToTmp(j, k, val);
        if (isPaused) yield;
        setCircleState(j, 'right-part');
        j++; k++;
    }

    // 回填：tmp → 原数组
    renderCode(LINE_COPYBACK);
    setComment(`回填 tmp[] → a[${l}..${r}]`);
    await sleep(getDelay() * 0.5);
    if (isPaused) yield;

    for (let t = 0; t < tmp.length; t++) {
        const targetPos = l + t;
        arr[targetPos] = tmp[t];

        setComment(`a[${targetPos}] = ${tmp[t]}`);
        await animToMain(t, targetPos, tmp[t]);
        if (isPaused) yield;
    }

    removeSplitFrame();
    await sleep(getDelay() * 0.3);
}

async function* mergeSortRecursive(l, r) {
    if (l < r) {
        const m = Math.floor((l + r) / 2);

        showSplitFrame(l, r);
        renderCode(LINE_SPLIT);
        setComment(`拆分 [${l}..${r}] → [${l}..${m}] + [${m+1}..${r}]`);
        await sleep(getDelay() * 0.6);
        if (isPaused) yield;

        renderCode(LINE_RECURSE_L);
        setComment(`递归左半 [${l}..${m}]`);
        await sleep(getDelay() * 0.3);
        if (isPaused) yield;
        yield* mergeSortRecursive(l, m);

        renderCode(LINE_RECURSE_R);
        setComment(`递归右半 [${m+1}..${r}]`);
        await sleep(getDelay() * 0.3);
        if (isPaused) yield;
        yield* mergeSortRecursive(m + 1, r);

        yield* mergeGen(l, m, r);
    } else {
        setCircleState(l, 'sorted');
        await sleep(getDelay() * 0.15);
    }
}

async function* sortGenerator() {
    comparisons = 0;
    swaps = 0;
    loops = 0;
    updateDivider(0);

    yield* mergeSortRecursive(0, arr.length - 1);

    updateDivider(arr.length);
    await sleep(300);
}

// ==================== 控制逻辑 ====================

async function startSort() {
    if (isRunning) return;
    isRunning = true;
    isPaused = false;
    document.getElementById('btnStart').textContent = '▶ 运行中';
    document.getElementById('btnPause').textContent = '⏸ 暂停';
    document.getElementById('doneBadge').classList.remove('show');

    arr = [...INIT_ARR];
    comparisons = 0;
    swaps = 0;
    loops = 0;
    renderCircles();
    renderTempBoxes();
    await sleep(50);

    generatorRef = sortGenerator();
    for await (const _ of generatorRef) {
        while (isPaused) await sleep(100);
    }

    renderCode(0);
    setComment('🎉 排序完成！所有元素已按升序排列');
    document.getElementById('doneBadge').classList.add('show');
    isRunning = false;
    document.getElementById('btnStart').textContent = '▶ 开始';
}

function togglePause() {
    if (!isRunning) return;
    isPaused = !isPaused;
    document.getElementById('btnPause').textContent = isPaused ? '▶ 继续' : '⏸ 暂停';
    setComment(isPaused ? '⏸ 已暂停' : '▶ 继续排序...');
}

function resetAll() {
    isRunning = false; isPaused = false;
    abortSleep(); generatorRef = null;
    arr = [...INIT_ARR]; comparisons = 0; swaps = 0; loops = 0;
    document.getElementById('btnStart').textContent = '▶ 开始';
    document.getElementById('btnPause').textContent = '⏸ 暂停';
    document.getElementById('doneBadge').classList.remove('show');
    document.getElementById('divider').classList.remove('show');
    removeSplitFrame();
    setComment('🎮 点击「开始」按钮启动排序动画');
    initRender();
}

function updateSpeed() {
    document.getElementById('speedValue').textContent = document.getElementById('speedSlider').value;
}

window.addEventListener('resize', () => { if (!isRunning) renderCircles(); });
window.addEventListener('DOMContentLoaded', initRender);
</script>
